<script>
        // Simple micro-interaction for list items
        document.querySelectorAll('.ripple').forEach(button => {
            button.addEventListener('mousedown', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                let ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.style.width = '2px';
                ripple.style.height = '2px';
                ripple.style.background = 'rgba(0, 61, 155, 0.1)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'scale(1)';
                ripple.style.transition = 'transform 0.6s linear, opacity 0.6s linear';
                ripple.style.pointerEvents = 'none';
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.style.transform = 'scale(500)';
                    ripple.style.opacity = '0';
                }, 10);
                
                setTimeout(() => {
                    ripple.remove();
                }, 700);
            });
        });
    </script>
