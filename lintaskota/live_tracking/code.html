<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .map-container {
      mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    }
    /* Simple animation for the vehicle pulse */
    @keyframes pulse-ring {
      0% { transform: scale(.33); opacity: 0.8; }
      80%, 100% { transform: scale(1.5); opacity: 0; }
    }
    .pulse-animation::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: #285ab9;
      animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }
    .route-path {
      stroke-dasharray: 10;
      animation: dash 20s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -200; }
    }
  </style>

<!-- Interaction Scripts -->
<script>
    // Simulate slight movement of the bus icon for "live" feel
    const bus = document.querySelector('.pulse-animation');
    let posX = 165;
    let posY = 520;
    
    setInterval(() => {
      posX += (Math.random() - 0.5) * 0.5;
      posY -= (Math.random() * 0.2); // Slowly move upwards towards destination
      bus.parentElement.style.left = `${posX}px`;
      bus.parentElement.style.top = `${posY}px`;
    }, 2000);

    // Ripple effect for buttons
    document.querySelectorAll('button').forEach(button => {
      button.addEventListener('click', function(e) {
        let x = e.clientX - e.target.offsetLeft;
        let y = e.clientY - e.target.offsetTop;
        let ripple = document.createElement('span');
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        ripple.classList.add('ripple');
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });
  </script>
</body></html>
